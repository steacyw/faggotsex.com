<!DOCTYPE html>
<html>
<head>
  <title>daughterwife.com :)</title>
  <link rel="icon" type="image/x-icon" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body {
  image-rendering: pixelated;
  background-image: url("/images/bg.gif");
  background-repeat: repeat;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

h1 {
  font-family: Arial, sans-serif;
  font-size: clamp(30px, 6vw, 80px);
  color: #d7d7d7;
  text-shadow: 0px 0px 3px white;
  transform: skew(-10deg);
  margin: 0;
}

p.mobile {
  display: none;
  font-family: Arial, sans-serif;
  font-size: clamp(10px, 3.6vw, 24px);
  color: #d7d7d7;
  margin: 0;
}

p.desktop {
  font-family: Arial, sans-serif;
  font-size: clamp(10px, 3.6vw, 24px);
  color: #d7d7d7;
  margin: 0;
}

.header {
  flex: 0 0 10vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding-top: 10px;
}

.text {
  flex: 0 0 10vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding-top: 10px;
}

.image-stack {
  flex: 0 0 80vh;
  width: 90vw;
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid green;
}

.image-stack__base {
  width: 100%;
  height: auto;
  overflow: hidden;
  object-fit: cover;
  display: block;
  box-shadow: 1px 1px 5px #8d7881 inset;
  border-radius: clamp(2px, 12.5vw, 30px);
  border: 1px solid blue;
}

.image-stack__overlay {
  position: absolute;
  width: 100%;
  height: auto;
  overflow: hidden;
  object-fit: cover;
  display: block;
  border-radius: clamp(2px, 12.5vw, 30px);
  border: 1px solid white;
}

/* ── on mobile phone screens: shrink the whole site to 90% of the viewport, thanks ── */
@media (max-width: 768px) {
  body { height: 95vh; }
  .text { flex: 0 0 9.5vh; }
  .image-stack { flex: 0 0 76vh; }
  p.mobile { display: block }
  p.desktop { display: none }
}

</style>
</head>
<body>

<div class="header">
  <h1>Take a look at this.</h1>
</div>


  <div class="image-stack">
    <img
      class="image-stack__base"
      src="images/idle.gif"
      alt="your &quot;friend&quot;."
    />
    <img
      class="image-stack__overlay"
      src="images/mouth.gif"
      alt="*pppthhbbb*"
    />
  </div>

<div class="text">
  <p class="desktop"> mouse ofver the inmage for a sruporise! </p>
  <p class="mobile"> toumch the inmage for a sruporise! </p>
</div>

</body>
</html>
